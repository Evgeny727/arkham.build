- name: Initial setup for Kamal host
  hosts: all
  become: yes
  become_user: root

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes

    - name: Upgrade all packages to latest version
      apt:
        upgrade: dist

    - name: Set timezone
      timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Create app user
      user:
        name: app
        password: "{{ app_password | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes

    - name: Ensure app .ssh directory exists
      file:
        path: /home/app/.ssh
        state: directory
        owner: app
        group: app
        mode: '0700'

    - name: Copy root SSH keys to app user
      copy:
        src: /root/.ssh/authorized_keys
        dest: /home/app/.ssh/authorized_keys
        owner: app
        group: app
        mode: '0600'
        remote_src: yes

    - name: Install unattended-upgrades
      apt:
        name: unattended-upgrades
        state: present

    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Limit SSH port 22
      ufw:
        rule: limit
        port: '22'
        proto: tcp

    - name: Allow HTTP port 80
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS port 443
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Install Docker, curl, git, and btop
      apt:
        name:
          - docker.io
          - curl
          - git
          - btop
        state: present

    - name: Add app user to docker group
      user:
        name: app
        groups: docker
        append: yes

    - name: Ensure journald config directory exists
      file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: '0755'

    - name: Configure journald retention limits
      copy:
        dest: /etc/systemd/journald.conf.d/arkham-build.conf
        mode: '0644'
        content: |
          [Journal]
          SystemMaxUse=1G
          RuntimeMaxUse=256M
          MaxRetentionSec=14days

    - name: Harden SSH authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} {{ item.value }}"
        state: present
      loop:
        - key: PasswordAuthentication
          value: 'no'
        - key: PermitRootLogin
          value: 'no'
        - key: KbdInteractiveAuthentication
          value: 'no'
        - key: ChallengeResponseAuthentication
          value: 'no'

    - name: Restart SSH service
      service:
        name: ssh
        state: restarted

